name: Run Calculator API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run Api dependency check
      uses: talK951/API-Dependency-Monitor@v0.0.4-expiremental
      with:
        port: '8080'
        is_provider: ${{ vars.IS_PROVIDER }}
        path_to_api_spec: ${{ vars.PATH_TO_API_SPEC }}
        backend_url: ${{ vars.BACKEND_URL }}
        host_name: ${{ vars.HOST_NAME }}

    - name: Run Calculator API tests
      run: |
        python test_calculator_api.py

    - name: Stop proxy
      if: always()
      run: |
        PID=$(cat moniter_pid.txt)
        kill -SIGINT $PID || true
        timeout 60 tail --pid=$PID -f /dev/null || true
        if kill -0 $PID 2>/dev/null; then
          echo "SIGINT did not kill the process — sending SIGKILL"
          kill -SIGKILL $PID || true
        else
          echo "Process was killed by SIGINT"
        fi
      
    - name: Print proxy output
      if: always()
      run: |
        echo ""
        echo "=================================================="
        echo "  PROXY OUTPUT"
        echo "=================================================="
        cat /tmp/proxy.log
        echo "=================================================="
        echo ""
      
    - name: Test output
      if: always()
      run: exit $(cat exit_code.txt)

    - name: Check proxy process is dead
      if: always()
      run: |
        PID=$(cat moniter_pid.txt)
        echo ""
        echo "=================================================="
        echo "  PROXY PROCESS CHECK  (PID: $PID)"
        echo "=================================================="
        if kill -0 $PID 2>/dev/null; then
          echo ""
          echo "  ✅  YES — PROCESS IS RUNNING"
          echo ""
        else
          echo ""
          echo "  ❌  NO — PROCESS IS NOT RUNNING"
          echo ""
        fi
        echo "=================================================="
        echo ""